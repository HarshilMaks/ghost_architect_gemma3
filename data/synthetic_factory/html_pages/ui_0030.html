<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-8"><div class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden border">
<header class="bg-indigo-600 px-6 py-4 text-white"><h1 class="text-2xl font-bold">Professional Portfolio</h1></header>
<main class="p-6"><div class="space-y-4"><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Avatar</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Full Name</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Job Title</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Company</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Location</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Short Bio</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Skills (Tags)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Experience List (Title, Company, Dates, Description)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Education List (Degree, Institution, Dates)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">LinkedIn URL</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">GitHub URL</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Portfolio URL</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div></div>
</main></div></body></html>
