<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 p-8"><div class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden border">
<header class="bg-indigo-600 px-6 py-4 text-white"><h1 class="text-2xl font-bold">Basic Account Settings Profile</h1></header>
<main class="p-6"><div class="space-y-4"><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">FullName (Editable Text)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">EmailAddress (Editable Email)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">PhoneNumber (Editable Phone)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Password (Button to Change Password)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">LanguagePreference (Dropdown)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">Timezone (Dropdown)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">EnableNotifications (Toggle)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div><div class="flex items-center justify-between p-3 border-b">
<span class="font-medium text-gray-700">DarkModePreference (Toggle)</span><div class="h-6 w-24 bg-indigo-100 rounded"></div></div></div>
</main></div></body></html>
