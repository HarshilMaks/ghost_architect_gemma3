<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Social Media Feed (Discovery & Interaction Focused)</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50"><header class="bg-white border-b px-6 py-4">
<h1 class="text-2xl font-bold">Social Media Feed (Discovery & Interaction Focused)</h1></header>
<main class="max-w-6xl mx-auto px-6 py-8">

<div class="bg-white rounded-lg border p-6"><h2 class="text-lg font-semibold mb-4">Social Media Feed (Discovery & Interaction Focused)</h2>
<form class="space-y-4">
<div><label class="block text-sm">{'id': 'story_carousel_section', 'type': 'Carousel', 'label': 'User Stories & Highlights', 'description': 'A horizontal, scrollable carousel displaying ephemeral stories or curated highlights from followed users and suggested accounts. Each item provides a quick gateway to their full story content.', 'components': [{'type': 'StoryBubble', 'props': {'userId': 'string', 'userName': 'string', 'userAvatarUrl': 'string', 'hasNewStory': 'boolean', 'isLive': 'boolean'}, 'actions': [{'label': 'View Story', 'type': 'navigate', 'target': '/stories/{userId}'}]}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'post_creation_area', 'type': 'Form', 'label': 'Create New Post Widget', 'description': 'An interactive widget at the top of the feed allowing users to quickly compose and share various types of content.', 'fields': [{'id': 'user_avatar_preview', 'type': 'Image', 'label': 'Your Avatar', 'src': '{currentUser.avatarUrl}'}, {'id': 'post_text_input', 'type': 'TextArea', 'label': "What's happening?", 'placeholder': 'Share an update, photo, or video...'}, {'id': 'add_media_button', 'type': 'Button', 'label': 'Photo/Video', 'icon': 'image_gallery', 'variant': 'secondary'}, {'id': 'add_poll_button', 'type': 'Button', 'label': 'Poll', 'icon': 'poll', 'variant': 'secondary'}, {'id': 'add_location_button', 'type': 'Button', 'label': 'Location', 'icon': 'location_pin', 'variant': 'secondary'}], 'actions': [{'label': 'Post', 'type': 'submit', 'style': 'primary', 'icon': 'send'}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'main_feed_stream', 'type': 'Container', 'label': 'Main Content Feed Stream', 'description': 'The primary vertical scrollable area displaying a personalized stream of posts, including rich media, text, and interactive elements. Content is typically sorted by relevance or recency.', 'orientation': 'vertical', 'components': [{'id': 'feed_item_template', 'type': 'Component', 'label': 'Individual Post Card', 'description': 'A template for a single post within the feed, detailing its structure and interactive components.', 'props': {'postId': 'string', 'authorId': 'string', 'authorName': 'string', 'authorHandle': 'string', 'authorAvatarUrl': 'string', 'timestamp': 'datetime', 'textContent': 'string', 'mediaAttachments': {'type': 'array', 'items': {'type': 'object', 'properties': {'url': {'type': 'string', 'format': 'url'}, 'type': {'type': 'string', 'enum': ['image', 'video']}}}, 'description': 'Array of image/video objects, supporting carousels'}, 'linkPreview': {'type': 'object', 'properties': {'url': {'type': 'string'}, 'title': {'type': 'string'}, 'description': {'type': 'string'}, 'imageUrl': {'type': 'string'}}, 'optional': True}, 'engagementMetrics': {'type': 'object', 'properties': {'likes': {'type': 'integer'}, 'comments': {'type': 'integer'}, 'shares': {'type': 'integer'}, 'views': {'type': 'integer', 'optional': True}}}, 'isLikedByCurrentUser': 'boolean', 'isBookmarkedByCurrentUser': 'boolean'}, 'sub_components': [{'id': 'post_header', 'type': 'UserInfoDisplay', 'label': 'Author & Time', 'elements': ['avatar', 'name', 'handle', 'timestamp', 'options_menu']}, {'id': 'post_body_text', 'type': 'TextDisplay', 'label': 'Post Content Text', 'props': {'maxLines': 6, 'expandable': True}}, {'id': 'post_media_carousel', 'type': 'ImageVideoCarousel', 'label': 'Media Display', 'optional': True}, {'id': 'post_link_preview', 'type': 'LinkCard', 'label': 'Embedded Link Preview', 'optional': True}, {'id': 'post_action_bar', 'type': 'ButtonGroup', 'label': 'Interaction Buttons', 'orientation': 'horizontal', 'buttons': [{'id': 'like_button', 'type': 'Button', 'label': 'Like', 'icon': 'heart', 'variant': 'toggle', 'countDisplay': 'engagementMetrics.likes'}, {'id': 'comment_button', 'type': 'Button', 'label': 'Comment', 'icon': 'chat', 'countDisplay': 'engagementMetrics.comments'}, {'id': 'share_button', 'type': 'Button', 'label': 'Share', 'icon': 'share', 'countDisplay': 'engagementMetrics.shares'}, {'id': 'bookmark_button', 'type': 'Button', 'label': 'Bookmark', 'icon': 'bookmark', 'variant': 'toggle'}]}, {'id': 'comments_preview_section', 'type': 'Container', 'label': 'Recent Comments & Input', 'description': 'Shows a summary of recent comments and an inline input for adding a new comment.', 'components': [{'type': 'TextLink', 'label': 'View all {engagementMetrics.comments} comments', 'target': '/post/{postId}/comments'}, {'type': 'CommentSnippet', 'label': 'Latest Comment'}, {'type': 'Form', 'label': 'Add a comment', 'fields': [{'id': 'new_comment_text', 'type': 'TextInput', 'placeholder': 'Add a comment...'}], 'actions': [{'label': 'Post', 'type': 'submit', 'style': 'link'}]}]}]}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'right_sidebar_widgets', 'type': 'Container', 'label': 'Right Sidebar', 'description': 'A dynamic sidebar providing personalized content, suggestions, and quick navigation links.', 'orientation': 'vertical', 'components': [{'id': 'current_user_profile_card', 'type': 'UserProfileCard', 'label': 'Current User Profile Overview', 'props': {'avatarUrl': 'string', 'displayName': 'string', 'handle': 'string', 'followersCount': 'integer', 'followingCount': 'integer'}, 'actions': [{'label': 'View Profile', 'type': 'navigate', 'target': '/profile/{currentUser.handle}'}]}, {'id': 'suggested_for_you_list', 'type': 'List', 'label': 'Suggested for You', 'description': 'A list of accounts or content topics recommended to the user based on their activity and connections.', 'components': [{'type': 'SuggestionItem', 'props': {'id': 'string', 'name': 'string', 'handle': 'string', 'avatarUrl': 'string', 'reason': 'string', 'type': 'enum (account, topic)'}, 'actions': [{'label': 'Follow', 'type': 'button', 'variant': 'primary'}, {'label': 'Dismiss', 'type': 'button', 'variant': 'text'}]}]}, {'id': 'trending_topics_widget', 'type': 'List', 'label': 'Trends for You', 'description': 'A list of trending hashtags and topics personalized for the user.', 'components': [{'type': 'TrendItem', 'props': {'topic': 'string', 'volume': 'string', 'description': 'string', 'rank': 'integer'}, 'actions': [{'label': 'View Trend', 'type': 'navigate', 'target': '/search?q={topic}'}]}]}, {'id': 'quick_links_navigation', 'type': 'ButtonGroup', 'label': 'Quick Links', 'orientation': 'vertical', 'buttons': [{'label': 'Explore', 'icon': 'search', 'type': 'navigate', 'target': '/explore'}, {'label': 'Notifications', 'icon': 'bell', 'type': 'navigate', 'target': '/notifications', 'badge': '{unreadNotificationCount}'}, {'label': 'Messages', 'icon': 'message', 'type': 'navigate', 'target': '/messages', 'badge': '{unreadMessageCount}'}, {'label': 'Settings', 'icon': 'settings', 'type': 'navigate', 'target': '/settings'}]}, {'id': 'advertisement_banner', 'type': 'Image', 'label': 'Sponsored Content', 'description': 'A small ad banner, typically contextual or targeted.', 'src': 'string', 'alt': 'Advertisement', 'actions': [{'label': 'Learn More', 'type': 'external_link', 'target': 'string'}]}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div>
<button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md">Submit</button>
</form></div></main></body></html>
