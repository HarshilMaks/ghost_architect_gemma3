<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TeamConnect Chat Hub</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50"><header class="bg-white border-b px-6 py-4">
<h1 class="text-2xl font-bold">TeamConnect Chat Hub</h1></header>
<main class="max-w-6xl mx-auto px-6 py-8">

<div class="bg-white rounded-lg border p-6"><h2 class="text-lg font-semibold mb-4">TeamConnect Chat Hub</h2>
<form class="space-y-4">
<div><label class="block text-sm">{'id': 'workspace_switcher', 'type': 'dropdown', 'label': 'Workspace', 'placeholder': 'Select Workspace', 'options': [{'value': 'main_team', 'label': 'Main Team'}, {'value': 'project_alpha', 'label': 'Project Alpha'}, {'value': 'client_support', 'label': 'Client Support'}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'user_profile_card', 'type': 'group', 'label': 'Current User', 'fields': [{'id': 'user_avatar', 'type': 'image', 'src': '/api/user/avatar/current'}, {'id': 'user_name', 'type': 'text', 'value': 'Alice Johnson'}, {'id': 'user_status_indicator', 'type': 'status_indicator', 'status': 'online'}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'channel_list', 'type': 'list', 'label': 'Channels', 'item_template': {'type': 'group', 'fields': [{'id': 'channel_icon', 'type': 'icon', 'name': 'hashtag'}, {'id': 'channel_name', 'type': 'text'}, {'id': 'unread_count', 'type': 'badge', 'value': 0, 'hidden_if_zero': True}]}, 'items': [{'channel_name': 'general', 'unread_count': 5}, {'channel_name': 'development', 'unread_count': 0}, {'channel_name': 'marketing', 'unread_count': 2}, {'channel_name': 'random', 'unread_count': 0}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'direct_message_list', 'type': 'list', 'label': 'Direct Messages', 'item_template': {'type': 'group', 'fields': [{'id': 'dm_avatar', 'type': 'image'}, {'id': 'dm_name', 'type': 'text'}, {'id': 'dm_status', 'type': 'status_indicator', 'status': 'offline'}, {'id': 'unread_count', 'type': 'badge', 'value': 0, 'hidden_if_zero': True}]}, 'items': [{'dm_avatar': '/api/user/avatar/bob', 'dm_name': 'Bob Smith', 'dm_status': 'online', 'unread_count': 1}, {'dm_avatar': '/api/user/avatar/carol', 'dm_name': 'Carol White', 'dm_status': 'offline', 'unread_count': 0}, {'dm_avatar': '/api/user/avatar/dave', 'dm_name': 'Dave Brown', 'dm_status': 'online', 'unread_count': 0}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'new_chat_button', 'type': 'button', 'label': 'New Chat', 'icon': 'plus'}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div><div><label class="block text-sm">{'id': 'chat_header', 'type': 'group', 'label': 'Chat Header', 'fields': [{'id': 'chat_title', 'type': 'text', 'value': '#general'}, {'id': 'chat_topic', 'type': 'text', 'value': 'Discussions about everything related to the team.'}, {'id': 'member_count', 'type': 'text', 'value': '12 members'}, {'id': 'search_chat_input', 'type': 'search_input', 'placeholder': 'Search messages...'}, {'id': 'call_button', 'type': 'button', 'icon': 'phone', 'label': 'Call'}]}</label>
<input type="text" class="w-full px-3 py-2 border rounded-md"></div>
<button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md">Submit</button>
</form></div></main></body></html>
